SSLProxyEngine On
ProxyPreserveHost On

<IfModule mod_headers.c>
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-SSL "on"
    RequestHeader set X-Forwarded-Port "443"
</IfModule>

<VirtualHost *:80>
    ServerName invoice.nusome.co.kr

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L,NE]
</VirtualHost>

<VirtualHost *:443>
    ServerName invoice.nusome.co.kr

    SSLEngine on
    SSLCertificateFile /etc/ssl/nusome/fullchain.pem
    SSLCertificateKeyFile /etc/ssl/nusome/privkey.pem

    ProxyPass / http://invoice-app:3000/
    ProxyPassReverse / http://invoice-app:3000/

    ErrorLog ${APACHE_LOG_DIR}/invoice-nusome-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/invoice-nusome-ssl-access.log combined
</VirtualHost>
