version: '2.3'

services:
  invoice-middleware:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start"
    restart: always
    volumes:
      - /home/suesoo/invoice-middleware:/app
      - /home/suesoo/invoice-storage:/storage
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      STORAGE_ROOT: /storage
      MYSQL_HOST: 192.168.20.10
      MYSQL_PORT: 3306
      MYSQL_DATABASE: invoice_ocr
      MYSQL_USER: invoice_app
      MYSQL_PASSWORD: change_me
      LLM_OCR_BASE_URL: http://127.0.0.1:11434
      WEB_APP_ALLOWED_ORIGIN: https://invoice.nusome.co.kr
